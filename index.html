<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StyleAndStitch</title>
    <style>
      :root {
        --bg: #f8f4ff;
        --surface: #ffffff;
        --text: #30243d;
        --muted: #6f5c82;
        --accent: #7c3aed;
        --accent-dark: #6025c8;
        --border: #e9ddff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 2rem 1rem;
        font-family: "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: radial-gradient(circle at top right, #f0e6ff 0%, var(--bg) 40%, #f6f6ff 100%);
        color: var(--text);
      }

      .hero {
        width: min(760px, 100%);
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: clamp(1.5rem, 3vw, 2.5rem);
        box-shadow: 0 16px 50px rgba(58, 22, 96, 0.12);
        text-align: center;
      }

      h1 {
        margin: 0 0 0.6rem;
        font-size: clamp(1.75rem, 3vw, 2.5rem);
      }

      p {
        margin: 0 auto 1.25rem;
        max-width: 62ch;
        color: var(--muted);
        line-height: 1.6;
      }

      .cta-button {
        display: inline-block;
        text-decoration: none;
        border-radius: 12px;
        padding: 0.85rem 1.25rem;
        font-weight: 700;
        color: #fff;
        background: linear-gradient(180deg, var(--accent), var(--accent-dark));
      }

      .cta-button:hover {
        filter: brightness(1.04);
      }
    </style>
  </head>
  <body>
    <main class="hero">
      <h1>StyleAndStitch</h1>
      <p>
        Explore virtual styling ideas and stitch pattern workflows. Start with a quick contact form to
        share your needs, feedback, or collaboration ideas.
      </p>
      <a href="contact.html">
        <button class="cta-button">Get Started</button>
      </a>
    </main>
  </body>
</html>
