<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | StyleAndStitch</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f8f4ff;
        --surface: #ffffff;
        --text: #30243d;
        --muted: #6f5c82;
        --accent: #7c3aed;
        --accent-dark: #6025c8;
        --border: #e9ddff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: radial-gradient(circle at top right, #f0e6ff 0%, var(--bg) 40%, #f6f6ff 100%);
        color: var(--text);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 2rem 1rem;
      }

      .contact-card {
        width: min(680px, 100%);
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: clamp(1.25rem, 2vw, 2rem);
        box-shadow: 0 16px 50px rgba(58, 22, 96, 0.12);
      }

      h1 {
        margin-top: 0;
        margin-bottom: 0.5rem;
        font-size: clamp(1.5rem, 2.2vw, 2rem);
      }

      p {
        margin-top: 0;
        color: var(--muted);
        line-height: 1.5;
      }

      form {
        display: grid;
        gap: 1rem;
      }

      .row {
        display: grid;
        gap: 1rem;
      }

      @media (min-width: 720px) {
        .row {
          grid-template-columns: 1fr 1fr;
        }
      }

      label {
        display: block;
        font-size: 0.95rem;
        font-weight: 600;
        margin-bottom: 0.35rem;
      }

      input,
      textarea {
        width: 100%;
        font: inherit;
        color: inherit;
        border: 1px solid #d9c9fb;
        border-radius: 12px;
        padding: 0.75rem 0.85rem;
        background: #fff;
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
      }

      input:focus,
      textarea:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.18);
      }

      textarea {
        min-height: 150px;
        resize: vertical;
      }

      .help {
        font-size: 0.85rem;
        color: var(--muted);
      }

      button {
        justify-self: start;
        border: 0;
        border-radius: 12px;
        padding: 0.8rem 1.15rem;
        font-weight: 700;
        font-size: 0.95rem;
        color: #fff;
        cursor: pointer;
        background: linear-gradient(180deg, var(--accent), var(--accent-dark));
      }

      button:hover {
        filter: brightness(1.04);
      }
    </style>
  </head>
  <body>
    <main class="contact-card">
      <h1>Contact StyleAndStitch</h1>
      <p>
        Have a feature idea, partnership inquiry, or question about virtual styling and stitch
        generation? Send us a message and we'll get back to you.
      </p>

      <form>
        <div class="row">
          <div>
            <label for="name">Name</label>
            <input id="name" name="name" type="text" autocomplete="name" placeholder="Your name" required />
          </div>

          <div>
            <label for="email">Email</label>
            <input
              id="email"
              name="email"
              type="email"
              autocomplete="email"
              placeholder="you@example.com"
              required
            />
          </div>
        </div>

        <div>
          <label for="subject">Subject</label>
          <input id="subject" name="subject" type="text" placeholder="How can we help?" required />
        </div>

        <div>
          <label for="message">Message</label>
          <textarea id="message" name="message" placeholder="Tell us more about your request..." required></textarea>
          <p class="help">We typically respond within 2-3 business days.</p>
        </div>

        <button type="submit">Send message</button>
      </form>
    </main>
  </body>
</html>
